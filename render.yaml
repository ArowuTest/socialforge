services:
  # ── Backend API (Go/Fiber) ──────────────────────────────────────────────────
  - type: web
    name: socialforge-api
    runtime: go
    rootDir: backend
    buildCommand: go build -o ./api ./cmd/api
    startCommand: ./api
    healthCheckPath: /health
    envVars:
      - key: GO_VERSION
        value: "1.22"
      - key: PORT
        value: "8080"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: socialforge
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
