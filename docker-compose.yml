version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: socialforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialforge
      POSTGRES_USER: socialforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialforge -d socialforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - socialforge_net

  redis:
    image: redis:7-alpine
    container_name: socialforge_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - socialforge_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: socialforge_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialforge_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialforge_frontend
    restart: unless-stopped
    env_file: frontend/.env.local
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - socialforge_net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  socialforge_net:
    driver: bridge
